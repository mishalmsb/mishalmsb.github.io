<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Animated Map Marker</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/app.css">
  </head>
  <body>

    <div class="container">
      <form id="map-form">
        <div class="row" style="margin-top: 20px;">
          <div class="col-xs-12 col-sm-6 col-md-3 form-group">
              <label for="top">Top</label>
              <input type="text" class="form-control" id="top" aria-describedby="top" placeholder="Enter Top">
          </div>
        </div>
        <div class="row">
          <div class="col-xs-12 col-sm-6 col-md-3 form-group">
              <label for="Left">Left</label>
              <input type="text" class="form-control" id="left" aria-describedby="left" placeholder="Enter Left">
          </div>
        </div>
        <div class="row">
            <div class="col-xs-12 col-sm-6 col-md-3" style="text-align: center;">
                <button id="mark" type="submit" class="btn btn-primary">Mark</button>
            </div>
        </div>
      </form>
      <div class="row">
        <div class="col-xs-12 col-sm-10 margin-auto" style="margin: 0 auto;">
          <div id="map-wrapper" class="map-wrapper">
            <img class="map-img" src="assets/img/map.png">
            <div class="markers">
                <div id="marker" class="marker" style="top: 39%; left: 50.3%;">
                    <span class="marker-info"></span>
                    <div class="marker-border"></div>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
