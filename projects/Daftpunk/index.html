



<!DOCTYPE html>
<html>
<head>
  <title>HTML5 Audio</title>
  <link rel="stylesheet" href="main.css">
  
</head>
<body style="text-align: center;">
<script type="text/javascript" src="app.js"></script>
    <div class="masterDiv">
        <div class="imgDiv"> <img src="img/daftPunkBackground.png"> </div>
        
        <div class="musicDiv">

            <button class="btPlay" id="a0"> Work It </button>
            <button class="btPlay" id="a1"> Make It </button>
            <button class="btPlay" id="a2"> Do It </button>
            <button class="btPlay" id="a3"> Makes Us </button>

            <button class="btPlay" id="a4"> Harder </button>
            <button class="btPlay" id="a5"> Better </button>
            <button class="btPlay" id="a6"> Faster </button>
            <button class="btPlay" id="a7"> Stronger </button>

            <button class="btPlay" id="a8"> More Than </button>
            <button class="btPlay" id="a9"> Hour </button>
            <button class="btPlay" id="a10"> Our </button>
            <button class="btPlay" id="a11"> Never </button>

            <button class="btPlay" id="a12"> Ever </button>
            <button class="btPlay" id="a13"> After </button>
            <button class="btPlay" id="a14"> Work Is</button>
            <button class="btPlay" id="a15"> Over </button>
 
        </div>

    </div>
    <audio id="audio"></audio>
</body>
</html>
